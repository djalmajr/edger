{{- $hasRootKey := or (eq .Values.rootKey.source "generated") (and (eq .Values.rootKey.source "existing") .Values.rootKey.existingSecret) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edger.fullname" . }}
  labels:
    {{- include "edger.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "edger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edger.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: edger
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "edger.fullname" . }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or $hasRootKey .Values.extraEnv (and .Values.otel.enabled .Values.otel.headersSecret.name) }}
          env:
            {{- if $hasRootKey }}
            - name: EDGER_ROOT_KEY_FILE
              value: {{ include "edger.rootKeyFilePath" . | quote }}
            {{- end }}
            {{- if and .Values.otel.enabled .Values.otel.headersSecret.name }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.otel.headersSecret.name | quote }}
                  key: {{ .Values.otel.headersSecret.key | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if $hasRootKey }}
            - name: root-key
              mountPath: {{ .Values.rootKey.mountPath }}
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $hasRootKey }}
        - name: root-key
          secret:
            secretName: {{ include "edger.rootKeySecretName" . }}
            items:
              - key: {{ .Values.rootKey.secretKey | quote }}
                path: {{ .Values.rootKey.fileName | quote }}
        {{- end }}
