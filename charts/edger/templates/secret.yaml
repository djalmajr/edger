{{- if not .Values.rootKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edger.rootKeySecretName" . }}
  labels:
    {{- include "edger.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.rootKey.secretKey | quote }}: {{ required "rootKey.value is required when rootKey.existingSecret is empty" .Values.rootKey.value | quote }}
{{- end }}
