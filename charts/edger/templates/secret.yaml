{{- if eq .Values.rootKey.source "generated" }}
{{- $secretName := include "edger.rootKeySecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $generated := randAlphaNum 48 }}
{{- if and $existing (hasKey $existing.data .Values.rootKey.secretKey) }}
{{- $generated = (index $existing.data .Values.rootKey.secretKey | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "edger.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.rootKey.secretKey | quote }}: {{ .Values.rootKey.value | default $generated | quote }}
{{- end }}
