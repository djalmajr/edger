apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edger.fullname" . }}
  labels:
    {{- include "edger.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.service.port | quote }}
  RUNTIME_WORKER_DIRS: {{ .Values.runtime.workerDirs | quote }}
  EDGER_CORE_WORKER_DIR: {{ .Values.runtime.coreWorkerDir | quote }}
  EDGER_CORE_WORKER_OVERLAY_DIR: {{ .Values.runtime.coreWorkerOverlayDir | quote }}
  EDGER_CRON_ENABLED: {{ .Values.cron.enabled | quote }}
  EDGER_JS_RUNTIME: {{ .Values.runtime.jsRuntime | quote }}
  {{- if .Values.otel.enabled }}
  EDGER_OTEL_ENABLED: "true"
  EDGER_OTEL_REQUIRED: {{ .Values.otel.required | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ required "otel.endpoint is required when otel.enabled=true" .Values.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.protocol | quote }}
  OTEL_TRACES_SAMPLER: {{ .Values.otel.tracesSampler | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.otel.tracesSamplerArg | quote }}
  {{- end }}
  HOME: "/tmp"
  DENO_DIR: "/tmp/deno"
  {{- if .Values.oidc.enabled }}
  EDGER_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  EDGER_OIDC_AUDIENCE: {{ .Values.oidc.audience | quote }}
  EDGER_OIDC_ROLES_CLAIM: {{ .Values.oidc.rolesClaim | quote }}
  EDGER_OIDC_REQUIRED_ROLE: {{ .Values.oidc.requiredRole | quote }}
  {{- end }}
