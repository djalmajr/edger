questions:
  - variable: image.repository
    label: Image Repository
    description: Container image repository for the EdgeR runtime.
    type: string
    default: ghcr.io/djalmajr/edger
    group: Runtime

  - variable: image.tag
    label: Image Tag
    description: Container image tag. Leave empty to use the chart appVersion.
    type: string
    default: ""
    group: Runtime

  - variable: image.pullPolicy
    label: Image Pull Policy
    description: When Kubernetes should pull the EdgeR image.
    type: enum
    default: IfNotPresent
    options:
      - IfNotPresent
      - Always
      - Never
    group: Runtime

  - variable: runtime.workerDirs
    label: Worker Directories
    description: Colon-separated directories scanned by RUNTIME_WORKER_DIRS.
    type: string
    default: /app/workers
    group: Runtime

  - variable: runtime.jsRuntime
    label: JS Runtime Mode
    description: Persistent process mode is the supported default; bridge is the legacy emergency fallback.
    type: enum
    default: process
    options:
      - process
      - bridge
    group: Runtime

  - variable: coreWorkerOverlay.persistence.enabled
    label: Persist Core Worker Overlays
    description: Mount a persistent volume for administrator-installed cPanel and WebIDE overlays. Disable to restore bundled versions whenever the pod is recreated.
    type: boolean
    default: true
    group: Runtime

  - variable: userWorkers.persistence.enabled
    label: Persist User Workers
    description: Mount persistent storage for user workers installed through the cPanel or WebIDE. Disable only for intentionally ephemeral runtimes.
    type: boolean
    default: true
    group: Runtime

  - variable: userWorkers.persistence.existingClaim
    label: Existing User Workers PVC
    description: Optional existing PersistentVolumeClaim for user worker packages. Leave empty to create one.
    type: string
    default: ""
    show_if: "userWorkers.persistence.enabled=true"
    group: Runtime

  - variable: userWorkers.persistence.storageClass
    label: User Workers Storage Class
    description: Optional storageClassName used when creating the user worker PersistentVolumeClaim.
    type: string
    default: ""
    show_if: "userWorkers.persistence.enabled=true&&userWorkers.persistence.existingClaim="
    group: Runtime

  - variable: userWorkers.persistence.size
    label: User Workers Volume Size
    description: Requested storage for installed user worker packages and versions.
    type: string
    default: 5Gi
    show_if: "userWorkers.persistence.enabled=true&&userWorkers.persistence.existingClaim="
    group: Runtime

  - variable: coreWorkerOverlay.persistence.existingClaim
    label: Existing Overlay PVC
    description: Optional existing PersistentVolumeClaim for core worker overlays. Leave empty to create one.
    type: string
    default: ""
    show_if: "coreWorkerOverlay.persistence.enabled=true"
    group: Runtime

  - variable: coreWorkerOverlay.persistence.storageClass
    label: Overlay Storage Class
    description: Optional storageClassName used when creating the overlay PersistentVolumeClaim.
    type: string
    default: ""
    show_if: "coreWorkerOverlay.persistence.enabled=true&&coreWorkerOverlay.persistence.existingClaim="
    group: Runtime

  - variable: coreWorkerOverlay.persistence.size
    label: Overlay Volume Size
    description: Requested storage for core worker overlay packages and versions.
    type: string
    default: 1Gi
    show_if: "coreWorkerOverlay.persistence.enabled=true&&coreWorkerOverlay.persistence.existingClaim="
    group: Runtime

  - variable: cron.enabled
    label: Enable Cron Jobs
    description: Enables manifest cron[] jobs through EDGER_CRON_ENABLED.
    type: boolean
    default: true
    group: Runtime

  - variable: otel.enabled
    label: Enable OpenTelemetry Export
    description: Export traces and operational events to an external OTLP Collector. Local cPanel observability remains available when disabled.
    type: boolean
    default: false
    group: Observability

  - variable: otel.endpoint
    label: OTLP Endpoint
    description: Collector endpoint, for example http://otel-collector.observability:4317. Required only when export is enabled.
    type: string
    default: ""
    show_if: "otel.enabled=true"
    group: Observability

  - variable: otel.protocol
    label: OTLP Protocol
    description: Transport used to export telemetry.
    type: enum
    default: grpc
    options:
      - grpc
      - http/protobuf
    show_if: "otel.enabled=true"
    group: Observability

  - variable: otel.tracesSampler
    label: Trace Sampler
    description: W3C parent-aware sampling policy used by the tracer.
    type: enum
    default: parentbased_traceidratio
    options:
      - parentbased_traceidratio
      - parentbased_always_on
      - always_on
      - always_off
    show_if: "otel.enabled=true"
    group: Observability

  - variable: otel.tracesSamplerArg
    label: Trace Sampling Ratio
    description: Ratio from 0.0 to 1.0 used by parentbased_traceidratio.
    type: string
    default: "0.1"
    show_if: "otel.enabled=true&&otel.tracesSampler=parentbased_traceidratio"
    group: Observability

  - variable: otel.required
    label: Require OTEL Initialization
    description: Fail startup when the configured exporter cannot be initialized. Keep disabled for non-critical telemetry.
    type: boolean
    default: false
    show_if: "otel.enabled=true"
    group: Observability

  - variable: otel.headersSecret.name
    label: OTLP Headers Secret
    description: Optional existing Kubernetes Secret containing OTLP authorization headers. Values are never stored in the chart ConfigMap.
    type: string
    default: ""
    show_if: "otel.enabled=true"
    group: Observability

  - variable: otel.headersSecret.key
    label: OTLP Headers Secret Field
    description: Secret data key containing the OTEL_EXPORTER_OTLP_HEADERS value.
    type: string
    default: headers
    show_if: "otel.enabled=true"
    group: Observability

  - variable: replicaCount
    label: Replica Count
    description: Number of EdgeR pod replicas when HPA is disabled.
    type: int
    default: 1
    min: 1
    max: 20
    group: Scaling

  - variable: hpa.enabled
    label: Enable HPA
    description: Enable Horizontal Pod Autoscaler for the EdgeR Deployment.
    type: boolean
    default: false
    group: Scaling

  - variable: hpa.minReplicas
    label: Minimum Replicas
    description: Minimum replicas when HPA is enabled.
    type: int
    default: 1
    min: 1
    max: 20
    show_if: "hpa.enabled=true"
    group: Scaling

  - variable: hpa.maxReplicas
    label: Maximum Replicas
    description: Maximum replicas when HPA is enabled.
    type: int
    default: 5
    min: 1
    max: 100
    show_if: "hpa.enabled=true"
    group: Scaling

  - variable: hpa.targetCPUUtilizationPercentage
    label: Target CPU Utilization
    description: Average CPU utilization percentage used by the HPA.
    type: int
    default: 70
    min: 1
    max: 100
    show_if: "hpa.enabled=true"
    group: Scaling

  - variable: service.port
    label: Service Port
    description: Port exposed by the Kubernetes Service and the EdgeR HTTP listener.
    type: int
    default: 3000
    min: 1
    max: 65535
    group: Networking

  - variable: ingress.enabled
    label: Enable Ingress
    description: Create an Ingress for the EdgeR service and cPanel.
    type: boolean
    default: false
    group: Networking

  - variable: ingress.host
    label: Ingress Host
    description: Hostname for the EdgeR Ingress.
    type: hostname
    default: ""
    show_if: "ingress.enabled=true"
    group: Networking

  - variable: ingress.className
    label: Ingress Class
    description: Optional ingressClassName, such as nginx, traefik, or alb.
    type: string
    default: ""
    show_if: "ingress.enabled=true"
    group: Networking

  - variable: ingress.path
    label: Ingress Path
    description: Path prefix routed to EdgeR. Use / for the cPanel root redirect.
    type: string
    default: /
    show_if: "ingress.enabled=true"
    group: Networking

  - variable: ingress.tls.enabled
    label: Enable TLS
    description: Attach TLS configuration to the Ingress.
    type: boolean
    default: false
    show_if: "ingress.enabled=true"
    group: Networking

  - variable: ingress.tls.secretName
    label: TLS Secret Name
    description: Existing Kubernetes TLS Secret used by the Ingress.
    type: string
    default: ""
    show_if: "ingress.enabled=true&&ingress.tls.enabled=true"
    group: Networking

  - variable: rootKey.source
    label: Root Key Source
    description: Provide a root key value for chart-generated Secret, or reference an existing Secret.
    type: enum
    default: generated
    options:
      - generated
      - existing
    group: Auth

  - variable: rootKey.value
    label: Root Key Value
    description: Break-glass root key stored in a chart-generated Secret and mounted as EDGER_ROOT_KEY_FILE.
    type: password
    default: ""
    show_if: "rootKey.source=generated"
    group: Auth

  - variable: rootKey.existingSecret
    label: Existing Root Key Secret
    description: Existing Secret name mounted as EDGER_ROOT_KEY_FILE. The key name defaults to root-key.
    type: string
    default: ""
    show_if: "rootKey.source=existing"
    group: Auth

  - variable: rootKey.secretKey
    label: Root Key Secret Field
    description: Secret data key containing the root key.
    type: string
    default: root-key
    group: Auth

  - variable: oidc.enabled
    label: Enable OIDC
    description: Expose EDGER_OIDC_* configuration for control-plane auth phase 2.
    type: boolean
    default: false
    group: Auth

  - variable: oidc.issuer
    label: OIDC Issuer
    description: Expected issuer URL for EDGER_OIDC_ISSUER.
    type: string
    default: ""
    show_if: "oidc.enabled=true"
    group: Auth

  - variable: oidc.audience
    label: OIDC Audience
    description: Expected token audience for EDGER_OIDC_AUDIENCE.
    type: string
    default: ""
    show_if: "oidc.enabled=true"
    group: Auth

  - variable: oidc.rolesClaim
    label: OIDC Roles Claim
    description: Claim path containing roles or groups, such as groups or realm_access.roles.
    type: string
    default: ""
    show_if: "oidc.enabled=true"
    group: Auth

  - variable: oidc.requiredRole
    label: OIDC Required Role
    description: Required role value for EDGER_OIDC_REQUIRED_ROLE.
    type: string
    default: ""
    show_if: "oidc.enabled=true"
    group: Auth

  - variable: resources.requests.cpu
    label: CPU Request
    description: CPU requested by each EdgeR pod.
    type: string
    default: 100m
    group: Resources

  - variable: resources.requests.memory
    label: Memory Request
    description: Memory requested by each EdgeR pod.
    type: string
    default: 128Mi
    group: Resources

  - variable: resources.limits.cpu
    label: CPU Limit
    description: CPU limit for each EdgeR pod.
    type: string
    default: "1"
    group: Resources

  - variable: resources.limits.memory
    label: Memory Limit
    description: Memory limit for each EdgeR pod.
    type: string
    default: 512Mi
    group: Resources

  - variable: extraEnv
    label: Extra Environment Variables
    description: Advanced YAML list of env entries appended to the EdgeR container env.
    type: multiline
    default: "[]"
    group: Runtime
