[advisories]
ignore = [
  { id = "RUSTSEC-2023-0089", reason = "atomic-polyfill is an unmaintained transitive dependency of postcard and Wasmtime; there is no patched release and no known vulnerability" },
  { id = "RUSTSEC-2023-0071", reason = "rsa is used only by tests to generate ephemeral local OIDC keys; EdgeR does not use it for runtime signing" },
]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
