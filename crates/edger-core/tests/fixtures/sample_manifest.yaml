name: "@acme/checkout"
version: "1.2.3"
enabled: true
entrypoint: index.ts
ttl: 300
timeout: 30s
idleTimeout: 2m
maxRequests: 1000
maxBodySize: 10mb
lowMemory: true
autoInstall: false
injectBase: true
cron:
  - schedule: "0 * * * *"
    path: /cron-tick
    method: GET
bindings:
  - kind: durableSql
    name: db
    namespace: "@acme"
    permissions:
      - sql:read
      - sql:write
  - kind: keyValue
    name: cache
  - kind: queue
    name: jobs
kind: serverless
env:
  NODE_ENV: production
